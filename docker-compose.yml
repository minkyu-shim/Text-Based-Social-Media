services:
  app:
    build: .
    ports:
      - "8000:5000"
    env_file: .env
    volumes:
      - .:/app   # live reload: local changes reflect immediately
    depends_on:
      - mongodb
      - neo4j
      - redis

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  neo4j_data:
  redis_data:
